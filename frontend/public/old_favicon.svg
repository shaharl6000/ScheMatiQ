<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#grad)"/>
  <!-- Clean table -->
  <rect x="4" y="4" width="19" height="18" rx="2" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Header row -->
  <line x1="4" y1="9" x2="23" y2="9" stroke="white" stroke-width="1.5"/>
  <!-- Row lines -->
  <line x1="4" y1="13.5" x2="23" y2="13.5" stroke="white" stroke-width="1"/>
  <line x1="4" y1="18" x2="23" y2="18" stroke="white" stroke-width="1"/>
  <!-- Column lines -->
  <line x1="11" y1="4" x2="11" y2="22" stroke="white" stroke-width="1"/>
  <line x1="17" y1="4" x2="17" y2="22" stroke="white" stroke-width="1"/>
  <!-- Magnifying glass -->
  <circle cx="23" cy="23" r="5" fill="rgba(29,78,216,0.8)" stroke="white" stroke-width="1.8"/>
  <line x1="26.5" y1="26.5" x2="29" y2="29" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
</svg>
